services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: rwa-marketplace-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --production
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CORS_ORIGINS
        sync: false   # set in Render dashboard
      - key: ADMIN_API_KEY
        generateValue: true
      - key: DATA_FILE
        value: data.json
      # Optional — set in dashboard if using Redis
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: rwa-cache
      #     property: connectionString

  # ── Frontend (Static Site) ──────────────────────────────────────────────────
  - type: web
    name: rwa-marketplace-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CONTRACT_ID
        sync: false   # set in Render dashboard
      - key: VITE_RPC_URL
        value: https://soroban-testnet.stellar.org:443
      - key: VITE_NETWORK_PASSPHRASE
        value: "Test SDF Network ; September 2015"
      - key: VITE_API_URL
        sync: false   # set to your backend Render URL, e.g. https://rwa-marketplace-backend.onrender.com
