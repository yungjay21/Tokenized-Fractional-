events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting zone for API requests: 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    
    # Connection limiting zone for DDoS protection: Max 50 connections per IP
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

    # Security headers
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    server {
        listen 80;
        server_name localhost;

        # Basic DDoS protection at the server level
        limit_conn addr_limit 50;

        # Block common suspicious user agents (basic WAF rule)
        if ($http_user_agent ~* (sqlmap|nikto|nmap|masscan|zmap)) {
            return 403;
        }

        # Block common SQL injection patterns in URL (basic WAF rule)
        if ($query_string ~* "union.*select.*\(") {
            return 403;
        }
        if ($query_string ~* "concat.*\(") {
            return 403;
        }

        # Proxy /api requests to the Express backend
        location /api/ {
            # Apply rate limiting to API endpoints
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Forward real IP
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy all other requests to the Vite frontend
        location / {
            proxy_pass http://127.0.0.1:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
